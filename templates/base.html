<!DOCTYPE html>
<html lang="en">
<head>
    {% block style%}
    {% endblock %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title%}{% endblock %}</title>
</head>
<body>
    <nav class="nav">
  <a class="nav-link active" aria-current="page" href="http://127.0.0.1:5000">HOME page</a>
  <a class="nav-link" href="http://127.0.0.1:5000/review">write a review</a>
  <a class="nav-link" href="http://127.0.0.1:5000/user_reviews">Your reviews</a>
</nav>
    {% block content %}
    {% with messages = get_flashed_messages() %}
      {% if messages %}
             {% for msg in messages %}
               <p>{{msg}}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}
    {% endblock %} 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
