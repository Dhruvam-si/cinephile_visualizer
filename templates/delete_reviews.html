{% extends'base.html'%}
{% block title %}
reviews.delete
{% endblock %}
{% block content %}
<form method="post" action="/delete_reviews">
    {% for review in values %}
    <input type="checkbox" value="{{review._id}}" name="review_ids">
    <label>{{review.user_movie}}</label>
    {% endfor %}
    <button type="submit" style="background:red; color:white;">Delete Selected
    </button>
    </form>

{% endblock %}
