{% extends "base.html" %}
{% block title%}{{name}} review{% endblock %}
{% block content %}
<div class="review-card">

    <h2> Your Review</h2>

    <div class="note">
        <span class="label">First Name</span>
        <div class="value">{{name}}  {{lastname}}</div>
    </div>
    <div class="note">
        <span class="label">Movie Name</span>
        <div class="value">{{movie}}</div>
    </div>

    <div class="note review-box">
        <span class="label">Review</span>
        <div class="value">{{review}}</div>
    </div>

    <a href="{{ url_for('logout') }}" class="btn btn-danger logout-btn">
    Logout
    </a>
</div>
{% endblock %}
