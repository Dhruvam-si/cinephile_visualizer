{% extends "base.html" %}
{% block title %}
Your reviews
{% endblock %}
{% block style %}
<style>
.review-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
    gap:22px;
    margin:35px 0;
}

.review-card{
    position:relative;
    padding:22px;
    border-radius:20px;
    backdrop-filter:blur(10px);
    transition:.35s;
    overflow:hidden;
    min-height:170px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.review-card::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:20px;
    padding:1px;
    background:linear-gradient(135deg,rgba(255,255,255,.45),transparent);
    -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;
            mask-composite:exclude;
}

.review-card:hover{
    transform:translateY(-7px) rotate(-1deg);
}

.review-card h3{
    margin:0;
    font-size:1.05rem;
    font-weight:700;
    letter-spacing:.5px;
    color:white;
}

.review-card p{
    margin:18px 0 0;
    color:#edf6ff;
    line-height:1.6;
    font-size:.95rem;
}

.review-card::after{
    content:"❝";
    position:absolute;
    top:-5px;
    right:18px;
    font-size:70px;
    opacity:.08;
    color:white;
}

/* Magenta */
.variant-0{
    background:linear-gradient(145deg,#ff53b6,#b93cff);
    box-shadow:0 0 25px rgba(255,82,180,.35);
}

/* Cyan */
.variant-1{
    background:linear-gradient(145deg,#00d9ff,#0099ff);
    box-shadow:0 0 25px rgba(0,210,255,.35);
}

/* Dark Blue */
.variant-2{
    background:linear-gradient(145deg,#283b7d,#111d4a);
    box-shadow:0 0 25px rgba(58,92,255,.25);
}
</style>
{% endblock %}
{% block content %}
<div class="review-grid">

{% for review in values %}

<div class="review-card variant-{{ loop.index0 % 3 }}">
    <h3>{{ review.user_movie }}</h3>

    <p>
        {{ review.user_review }}
    </p>
</div>

{% endfor %}

</div>
{% endblock %}
